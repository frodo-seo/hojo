AutoName: Hojo
Description: |
    Hojo is an open-source, serverless personal finance app.

    Snap one screenshot and Hojo logs expenses, income, and asset
    holdings — or let it auto-parse payment notifications from card
    and banking apps. All transactions and settings are stored only
    in the device's IndexedDB. No cloud sync, no accounts, no central
    server.

    AI features (classification, parsing, monthly and yearly reports)
    run on a BYOK (Bring Your Own Key) model — users provide their
    own Anthropic and Datalab API keys, stored locally on the device.

    Features:

    * Screenshot-first input — receipts, payment notifications,
      payslips, bills, brokerage, exchange screens
    * Notification auto-parsing — Haiku reads card/pay/bank
      notifications and extracts amount, merchant, and category
    * 5-way auto classification — expense, income, recurring expense,
      recurring income, asset trade
    * Asset portfolio — stocks/ETFs, crypto, commodities with live
      prices; net worth with FX conversion + pie chart
    * Monthly budgets with usage tracking
    * Monthly and yearly AI reports
    * Korean / English UI
    * 9 PM logging reminder
    * CSV export

RepoType: git
Repo: https://github.com/frodo-seo/hojo.git

Builds:
  - versionName: 0.3.1
    versionCode: 4
    commit: v0.3.1
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y curl ca-certificates
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      - apt-get install -y nodejs
    init:
      - cd ../..
      - npm ci
      - npm run build
      - npx cap sync android
    gradle:
      - yes
    output: build/outputs/apk/release/app-release-unsigned.apk

AutoUpdateMode: Version
