AutoName: Hojo
Description: |
    Hojo is an open-source, serverless personal finance app.

    All transactions and settings are stored only in the device's local
    IndexedDB. No cloud sync, no accounts, no central server.

    AI features (receipt OCR, monthly and yearly reports) run on a BYOK
    (Bring Your Own Key) model — users provide their own Anthropic and
    Datalab API keys, stored locally on the device.

    Features:

    * Record expenses and income with categories, memos, and dates
    * Manage recurring income/expenses
    * Monthly budgets with usage tracking
    * Receipt camera OCR with automatic parsing
    * Monthly and yearly AI reports
    * Portfolio tracking: stocks, crypto, cash with live prices
    * Korean / English UI
    * 9 PM logging reminder
    * CSV export

RepoType: git
Repo: https://github.com/frodo-seo/hojo.git

Builds:
  - versionName: 0.1.0
    versionCode: 1
    commit: v0.1.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - cd ../..
      - npm ci
      - npm run build
      - npx cap sync android
    gradle:
      - yes
    output: build/outputs/apk/release/app-release-unsigned.apk

